<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Scraper</title>
  <link href="popup.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
</head>
<body class="bg-navy text-slate-200 m-0 w-[380px] overflow-hidden antialiased">
  <div class="relative w-full min-h-[400px] flex flex-col p-5 bg-gradient-to-b from-navy to-[#060913]">
    <!-- Animated background mesh -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-20">
      <div class="absolute -top-[50%] -left-[50%] w-[200%] h-[200%] bg-[radial-gradient(circle_at_center,rgba(59,130,246,0.15)_0,transparent_50%)] animate-[spin_20s_linear_infinite]"></div>
    </div>

    <!-- Header / Status -->
    <div class="relative z-10 flex items-center justify-between mb-4">
      <h1 class="font-heading text-xl font-bold text-white tracking-wide">Lead<span class="text-gold">Vault</span></h1>
      <div id="status-badge" class="px-2 py-1 text-[10px] font-bold uppercase tracking-wider rounded-full bg-slate-800 text-slate-400 border border-slate-700 transition-colors">
        Checking...
      </div>
    </div>

    <!-- Main Content Area -->
    <div id="content-area" class="relative z-10 flex-grow flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
      <div class="animate-pulse flex flex-col items-center">
        <div class="w-20 h-20 rounded-full border-2 border-gold/30 border-t-gold animate-spin mb-4"></div>
        <p class="text-sm text-slate-400 font-medium">Scanning Profile...</p>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="relative z-10 mt-4 space-y-3 hidden" id="action-area">
      <div class="grid grid-cols-2 gap-2">
        <div class="flex flex-col gap-1">
          <button id="access-email-btn" class="w-full px-3 py-2 rounded-lg text-xs font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors flex items-center justify-center gap-1 shadow-[0_4px_15px_rgba(37,99,235,0.2)]">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            Access Email
          </button>
          <div id="email-result" class="text-[10px] text-slate-300 text-center truncate w-full h-3"></div>
        </div>
        <div class="flex flex-col gap-1">
          <button id="access-phone-btn" class="w-full px-3 py-2 rounded-lg text-xs font-bold text-white bg-green-600 hover:bg-green-500 transition-colors flex items-center justify-center gap-1 shadow-[0_4px_15px_rgba(22,163,74,0.2)]">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            Access Phone
          </button>
          <div id="phone-result" class="text-[10px] text-slate-300 text-center truncate w-full h-3"></div>
        </div>
      </div>

      <button id="save-btn" class="w-full relative group overflow-hidden rounded-lg bg-gradient-to-r from-gold to-yellow-600 p-[1px] font-medium text-navy shadow-[0_0_15px_rgba(245,158,11,0.3)] transition-all hover:shadow-[0_0_25px_rgba(245,158,11,0.5)]">
        <div class="relative px-4 py-3 bg-gradient-to-r from-gold to-yellow-500 rounded-md transition-all group-hover:bg-opacity-0">
          <span class="flex items-center justify-center gap-2 text-base font-bold text-navy">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Save to Dashboard
          </span>
        </div>
      </button>

      <button id="view-dashboard-btn" class="w-full px-4 py-2.5 rounded-lg text-sm font-medium text-slate-300 bg-slate-800/50 hover:bg-slate-800 border border-slate-700 transition-colors flex items-center justify-center gap-2">
        View Dashboard
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
      </button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="absolute bottom-4 left-1/2 -translate-x-1/2 translate-y-[150%] opacity-0 transition-all duration-300 px-4 py-2 rounded-lg text-sm font-medium bg-green-500/20 text-green-400 border border-green-500/30 whitespace-nowrap z-50 shadow-lg pointer-events-none">
      Lead saved successfully!
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
