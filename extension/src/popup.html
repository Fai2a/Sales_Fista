<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LeadVault</title>
  <link href="./style.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #141414;
      --surface2:     #1c1c1c;
      --border:       #2a2a2a;
      --text:         #f0f0f0;
      --muted:        #777;
      --blue:         #4f8ef7;
      --green:        #34d399;
      --gold:         #f59e0b;
      --red:          #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 360px;
      overflow: hidden;
    }
    .container { display: flex; flex-direction: column; min-height: 460px; position: relative; }

    /* ── Top Bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .app-name { font-size: 15px; font-weight: 800; color: var(--text); }
    .app-name span { color: var(--blue); }

    .top-right { display: flex; align-items: center; gap: 10px; }
    #status-badge {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; padding: 3px 9px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted); transition: all 0.3s;
    }
    #settings-toggle {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      color: var(--muted); width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    #settings-toggle:hover { border-color: #444; color: var(--text); }

    /* ── Settings Drawer ── */
    #settings-drawer {
      display: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      gap: 10px;
      flex-direction: column;
    }
    #settings-drawer.visible { display: flex; }
    .settings-label {
      font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 2px;
    }
    .settings-hint {
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }
    .settings-hint a { color: var(--blue); text-decoration: none; }
    .settings-row { display: flex; gap: 8px; }
    #api-key-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--text);
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: var(--blue); }
    #api-key-input::placeholder { color: var(--muted); }
    #save-key-btn {
      background: var(--blue); color: #fff; border: none;
      border-radius: 8px; padding: 9px 14px; font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    #save-key-btn:hover { background: #3a7de8; }

    /* ── Skeleton Loaders ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, #222 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: skeleton-pulse 1.5s infinite;
      border-radius: 4px;
      display: inline-block;
      min-height: 1em;
      width: 100%;
    }
    @keyframes skeleton-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-text { width: 80%; height: 14px; margin-bottom: 4px; }
    .skeleton-name { width: 60%; height: 22px; margin-bottom: 8px; }

    /* ── Profile Header ── */
    #profile-header {
      display: block; /* Always block for progressive render */
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
    }
    .profile-name {
      font-size: 19px; font-weight: 800; color: #fff;
      letter-spacing: -0.4px; line-height: 1.25; margin-bottom: 5px;
      min-height: 24px;
    }
    .profile-headline {
      font-size: 12px; font-weight: 500; color: var(--muted);
      line-height: 1.5; min-height: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Scan State ── */
    #scan-state {
      display: none; /* Hide full screen spinner per request */
      flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 20px;
    }
    #scan-state.visible { display: flex; }
    .scan-name-text { font-size: 16px; font-weight: 700; color: #fff; text-align: center; }
    .scan-sub { font-size: 11px; color: var(--muted); text-align: center; font-weight: 500; }

    /* ── Contact Results ── */
    #contact-results {
      padding: 14px 16px 0;
      display: flex; flex-direction: column; gap: 8px;
    }
    .contact-pill {
      display: none; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px;
      font-size: 12px; font-weight: 500; color: #ddd;
    }
    .contact-pill.visible { display: flex; }
    .contact-pill svg { flex-shrink: 0; }

    /* ── Error State ── */
    #error-state {
      flex: 1; display: none;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 24px;
      text-align: center; gap: 10px;
    }
    #error-state.visible { display: flex; }
    .error-icon {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .error-title { font-size: 14px; font-weight: 700; color: #fff; }
    #error-msg { font-size: 12px; color: var(--muted); line-height: 1.65; }

    /* ── Action Area ── */
    #action-area {
      display: none; flex-direction: column;
      gap: 9px; padding: 14px 16px 18px;
      margin-top: auto;
    }
    #action-area.visible { display: flex; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; font-size: 12px; font-weight: 600;
      border-radius: 10px; padding: 11px 14px;
      border: none; cursor: pointer;
      transition: all 0.18s; white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .btn:active { transform: scale(0.97); }

    .btn-email {
      background: rgba(79,142,247,0.12);
      border: 1px solid rgba(79,142,247,0.3);
      color: var(--blue);
    }
    .btn-email:hover { background: rgba(79,142,247,0.22); border-color: var(--blue); }

    .btn-phone {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.3);
      color: var(--green);
    }
    .btn-phone:hover { background: rgba(52,211,153,0.2); border-color: var(--green); }

    .btn-save {
      width: 100%; background: var(--gold); color: #000;
      font-size: 13px; font-weight: 700; border-radius: 10px;
    }
    .btn-save:hover { background: #f7ab12; box-shadow: 0 0 20px rgba(245,158,11,0.3); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-dashboard {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); color: var(--muted);
      font-size: 12px;
    }
    .btn-dashboard:hover { color: var(--text); border-color: #444; }

    /* ── Toast ── */
    #toast {
      position: absolute; bottom: 14px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      opacity: 0; transition: all 0.3s;
      font-size: 12px; font-weight: 600; padding: 8px 16px;
      border-radius: 8px; white-space: nowrap; z-index: 99;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
    #toast.error   { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  </style>
</head>
<body>
<div class="container">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="app-name">Lead<span>Vault</span></div>
    <div id="status-badge">Checking…</div>
  </div>


  <!-- Profile Header (Permanently Visible Area) -->
  <div id="profile-header">
    <div class="profile-name" id="profile-name">—</div>
    <div class="profile-headline" id="profile-headline"></div>
    <!-- Other metadata kept as fallback/extra info -->
    <div id="profile-metadata" style="margin-top: 8px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; display: flex; flex-direction: column; gap: 4px;">
      <div id="profile-designation" style="color: var(--text); font-size: 12px; display: none;"></div>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span id="profile-company"></span>
        <span id="profile-location-dot" style="opacity: 0.3; display: none;">•</span>
        <span id="profile-location"></span>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div id="action-area" class="visible">
    <!-- Contact fetch buttons -->
    <div class="btn-row">
      <button id="access-email-btn" class="btn btn-email">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Access Email
      </button>
      <button id="access-phone-btn" class="btn btn-phone">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        Access Phone
      </button>
    </div>

    <!-- Contact Results (Moved below buttons) -->
    <div id="contact-results" style="padding: 5px 0; display: flex; flex-direction: column; gap: 8px;">
      <div id="email-result" class="contact-pill">
        <svg width="15" height="15" fill="none" stroke="#4f8ef7" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <div style="display: flex; flex-direction: column; gap: 2px;">
          <span id="email-text">—</span>
          <div id="enrichment-info" style="display: none; align-items: center; gap: 4px; font-size: 9px; opacity: 0.8;">
            <span id="enrichment-source"></span>
            <span id="enrichment-dot" style="opacity: 0.5;">•</span>
            <span id="enrichment-confidence" style="padding: 1px 4px; border-radius: 4px; font-weight: 700; text-transform: uppercase;"></span>
          </div>
        </div>
      </div>
      <div id="phone-result" class="contact-pill">
        <svg width="15" height="15" fill="none" stroke="#34d399" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
        </svg>
        <span id="phone-text">—</span>
      </div>
    </div>

    <!-- Save & navigate -->
    <button id="save-btn" class="btn btn-save">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      Save to Dashboard
    </button>
    <button id="view-dashboard-btn" class="btn btn-dashboard">
      View Dashboard &nbsp;→
    </button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>
</div>
<script type="module" src="./popup.ts"></script>
</body>
</html>
